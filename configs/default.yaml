seed: 42
data:
  train_path: data/processed/train.jsonl
  valid_path: data/processed/valid.jsonl
  test_path: data/processed/test.jsonl
  demo_path: data/academic_demo.json
model:
  input_dim: 1537
  hidden_dim: 256
  dropout: 0.1
train:
  batch_size: 32
  epochs: 5
  lr: 0.001
  margin: 1.0
eval:
  topk: [1, 3, 5]
