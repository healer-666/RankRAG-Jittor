seed: 42
run_name: msmarco_medium
data:
  train_path: data/processed/msmarco_medium/train.jsonl
  valid_path: data/processed/msmarco_medium/valid.jsonl
  test_path: data/processed/msmarco_medium/test.jsonl
  demo_path: data/academic_demo.json
model:
  input_dim: 1537
  hidden_dim: 256
  dropout: 0.1
train:
  batch_size: 32
  epochs: 5
  lr: 0.001
  margin: 1.0
eval:
  topk: [1, 3, 5, 10]
outputs:
  torch_log: logs/msmarco_medium_torch_train.log
  jittor_log: logs/msmarco_medium_jittor_train.log
  torch_model: outputs/msmarco_medium_torch_model.pt
  jittor_model: outputs/msmarco_medium_jittor_model.pkl
  torch_metrics: outputs/msmarco_medium_torch_metrics.json
  jittor_metrics: outputs/msmarco_medium_jittor_metrics.json
  torch_demo: outputs/msmarco_medium_demo_ranking_result_torch.json
  jittor_demo: outputs/msmarco_medium_demo_ranking_result_jittor.json
  torch_rankings: outputs/msmarco_medium_torch_test_rankings.json
  jittor_rankings: outputs/msmarco_medium_jittor_test_rankings.json
